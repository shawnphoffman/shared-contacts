name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            sync-service/package-lock.json
            ui/package-lock.json

      - name: Install sync-service dependencies
        run: cd sync-service && npm ci

      - name: Install UI dependencies
        run: cd ui && npm ci

      - name: Run sync-service unit tests
        run: cd sync-service && npm run test:unit

      - name: Run UI unit tests
        run: cd ui && npm run test:unit

  docker-smoke:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker compose -f docker-compose.prod.yml build

      - name: Start services
        run: |
          echo "POSTGRES_USER=test" >> .env
          echo "POSTGRES_PASSWORD=testpassword123" >> .env
          docker compose -f docker-compose.prod.yml up -d

      - name: Wait for health check
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3030/api/health > /dev/null 2>&1; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for services... (attempt $i/30)"
            sleep 5
          done
          echo "Health check failed after 30 attempts"
          docker compose -f docker-compose.prod.yml logs
          exit 1

      - name: Verify API responds
        run: curl -sf http://localhost:3030/api/health

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.prod.yml down -v
