name: Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.cursor/**'
      - '.vscode/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.cursor/**'
      - '.vscode/**'
      - 'LICENSE'
      - '.gitignore'

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            sync-service/package-lock.json
            ui/package-lock.json

      - name: Install sync-service dependencies
        run: cd sync-service && npm ci

      - name: Install UI dependencies
        run: cd ui && npm ci

      - name: Lint sync-service
        run: cd sync-service && npm run lint

      - name: Lint UI
        run: cd ui && npm run lint

      - name: Run sync-service unit tests
        run: cd sync-service && npm run test:unit

      - name: Run UI unit tests
        run: cd ui && npm run test:unit

  docker-smoke:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v5

      - name: Create .env for required variables
        run: |
          echo "POSTGRES_USER=test" >> .env
          echo "POSTGRES_PASSWORD=testpassword123" >> .env

      - name: Build Docker image
        run: docker build -t ghcr.io/shawnphoffman/shared-contacts:latest .

      - name: Start services
        run: docker compose -f docker-compose.prod.yml up -d --no-build

      - name: Wait for health check
        run: |
          for i in $(seq 1 30); do
            if docker exec shared-contacts-app node -e "require('http').get('http://localhost:3030/api/health',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))" 2>/dev/null; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for services... (attempt $i/30)"
            sleep 5
          done
          echo "Health check failed after 30 attempts"
          docker compose -f docker-compose.prod.yml logs
          exit 1

      - name: Verify API responds
        run: docker exec shared-contacts-app node -e "require('http').get('http://localhost:3030/api/health',(r)=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>{console.log(d);process.exit(r.statusCode===200?0:1)})}).on('error',e=>{console.error(e);process.exit(1)})"

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.prod.yml down -v
